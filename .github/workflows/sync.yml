name: Sync Check-in Data

on:
  push:
    paths:
      - 'checkins/**'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run sync script
        # Fix: Run from root directory so paths work correctly
        run: |
          python scripts/sync.py
      
      - name: Commit changes
        # Fix: Add dashboard.json to commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md users/ dashboard.json
          git diff --staged --quiet || git commit -m "Auto-update statistics and user files"
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
